    url: https://cpa.imtd.top
  - name: New-API
    url: https://ai.imtd.top/api/notice
  - name: Vaultwarden Service
    url: https://pwd.imtd.top/alive
  - name: Brintools API Service
    url: https://brintools.com/actuator/health
  - name: XPay管理后台
    url: https://admin.i-paying.com/actuator/health
  - name: XPay Payin
    url: https://open.i-paying.com/actuator/health
  - name: XPay Payout
